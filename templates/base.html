{% load static %}

<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %} CopyKat {% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Navbar -->
    {% block navbar %}
    


    {% endblock navbar %}

    <!-- Main Content -->

    <div class="container mt-4">{% block content %} 
      
      
      {% endblock content %}</div>

    <!-- Footer -->

    {% block footer %}


    {% endblock footer %}

  </body>
</html>
